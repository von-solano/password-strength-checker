<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Real-time Password Strength Checker</title>
        <script src="/script.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <h1>Password Strength Checker</h1>
        <hr>
        <p>Test your password strength down below:</p>
        <input type="password" id="passwordInput" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"> <!--input password-->
        <input type="checkbox" onclick="togglePassword()">Show Password <!--displays password on tick-->

            <h3>Password must contain the following:</h3>
            <ul class="centered-list">
                <li class="invalid">includes a lowercase letter</li>
                <li class="invalid">includes an uppercase letter</li>
                <li class="invalid">contains at least 8 characters</li>
                <li class="invalid">includes at least one number</li>
                <li class="invalid">at least one special character</li>
            </ul>


    </body>
</html>
